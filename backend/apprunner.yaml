version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip install -r requirements.txt

run:
  # AWS App Runner Standard-Port
  command: uvicorn main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: ENVIRONMENT
      value: production
    - name: PYTHONUNBUFFERED
      value: "1"
  # ANTHROPIC_API_KEY wird in der AWS Console als Secret gesetzt — NICHT hier eintragen!
